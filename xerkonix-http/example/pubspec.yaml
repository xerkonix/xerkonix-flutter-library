name: example
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  xerkonix_error_handler: ^1.0.0
  xerkonix_design_system: ^1.1.1
  xerkonix_http:
    path: ../
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# Local-development only: resolve the sibling packages by path so the example
# builds against the working-tree 1.1.0. STRIP before publishing.
dependency_overrides:
  xerkonix_logger:
    path: ../../xerkonix-logger
  xerkonix_error_handler:
    path: ../../xerkonix-error-handler

flutter:

  uses-material-design: true
