name: xerkonix_error_handler
description: A comprehensive error and exception handling package for Flutter applications. Provides structured error types, custom exceptions, error message handlers, and UI components (dialogs, toasts) for consistent error management across applications.
version: 1.1.0
repository: https://github.com/xerkonix/xerkonix-flutter-library/tree/main/xerkonix-error-handler
issue_tracker: https://github.com/xerkonix/xerkonix-flutter-library/issues

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  xerkonix_logger: ^1.1.0
  http: ^1.6.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Local-development only: resolve sibling packages by path so the three packages
# build together against the working tree (tests/analyze exercise the LOCAL
# source, not the published pub.dev release). The coordinator STRIPS this block
# before publishing (the hosted caret constraints above are what ship).
dependency_overrides:
  xerkonix_logger:
    path: ../xerkonix-logger

flutter:
